---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
  namespace: {{ include "nemesis.namespace" . }}
  labels:
    {{- include "nemesis.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.minio.storage.storageClass }}
  storageClassName: {{ .Values.minio.storage.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.minio.storage.size }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: {{ include "nemesis.namespace" . }}
  labels:
    {{- include "nemesis.labels" . | nindent 4 }}
    {{- include "nemesis.selectorLabels" (dict "name" "minio" "context" .) | nindent 4 }}
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels:
      {{- include "nemesis.selectorLabels" (dict "name" "minio" "context" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nemesis.selectorLabels" (dict "name" "minio" "context" .) | nindent 8 }}
      annotations:
        dapr.io/enabled: "false"
    spec:
      containers:
        - name: minio
          image: "{{ .Values.minio.image.repository }}:{{ .Values.minio.image.tag }}"
          command:
            - minio
            - server
            - /data
            - --console-address
            - ":9001"
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: nemesis-secrets
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nemesis-secrets
                  key: MINIO_ROOT_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: api
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: api
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            {{- toYaml .Values.minio.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minio-data
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: {{ include "nemesis.namespace" . }}
  labels:
    {{- include "nemesis.labels" . | nindent 4 }}
    {{- include "nemesis.selectorLabels" (dict "name" "minio" "context" .) | nindent 4 }}
spec:
  selector:
    {{- include "nemesis.selectorLabels" (dict "name" "minio" "context" .) | nindent 4 }}
  ports:
    - port: 9000
      targetPort: api
      name: api
    - port: 9001
      targetPort: console
      name: console
---
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  namespace: {{ include "nemesis.namespace" . }}
  labels:
    {{- include "nemesis.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        {{- include "nemesis.selectorLabels" (dict "name" "minio-init" "context" .) | nindent 8 }}
      annotations:
        dapr.io/enabled: "false"
    spec:
      restartPolicy: OnFailure
      containers:
        - name: minio-init
          image: "{{ .Values.minio.mcImage.repository }}:{{ .Values.minio.mcImage.tag }}"
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for MinIO to be ready..."
              until mc alias set nemesis http://minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" 2>/dev/null; do
                echo "MinIO not ready, retrying in 3s..."
                sleep 3
              done
              echo "MinIO is ready."
              {{- range .Values.minio.buckets }}
              mc mb --ignore-existing nemesis/{{ . }}
              echo "Bucket '{{ . }}' ensured."
              {{- end }}
              echo "MinIO initialization complete."
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: nemesis-secrets
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nemesis-secrets
                  key: MINIO_ROOT_PASSWORD
