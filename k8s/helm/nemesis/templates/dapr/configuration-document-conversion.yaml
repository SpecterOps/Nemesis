apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: document-conversion-config
  namespace: {{ include "nemesis.namespace" . }}
  labels:
    {{- include "nemesis.labels" . | nindent 4 }}
spec:
  metric:
    enabled: true
  {{- if .Values.monitoring.enabled }}
  tracing:
    expandParams: true
    samplingRate: "1"
    otel:
      protocol: grpc
      endpointAddress: "otel-collector:4317"
      isSecure: false
  {{- end }}
