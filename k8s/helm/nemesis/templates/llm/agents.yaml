{{- if .Values.llm.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agents
  namespace: {{ include "nemesis.namespace" . }}
  labels:
    {{- include "nemesis.labels" . | nindent 4 }}
    {{- include "nemesis.selectorLabels" (dict "name" "agents" "context" .) | nindent 4 }}
spec:
  replicas: {{ .Values.llm.agents.replicas }}
  selector:
    matchLabels:
      {{- include "nemesis.selectorLabels" (dict "name" "agents" "context" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nemesis.selectorLabels" (dict "name" "agents" "context" .) | nindent 8 }}
      annotations:
        {{- include "nemesis.daprAnnotations" (dict "appId" .Values.llm.agents.dapr.appId "appPort" (toString .Values.llm.agents.appPort) "config" .Values.llm.agents.dapr.config) | nindent 8 }}
    spec:
      containers:
        - name: agents
          image: {{ include "nemesis.image" (dict "image" .Values.llm.agents.image "context" .) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.llm.agents.appPort }}
              name: http
            - containerPort: {{ .Values.llm.agents.mcpPort }}
              name: mcp
          env:
            - name: APP_ID
              value: {{ .Values.llm.agents.dapr.appId | quote }}
            - name: DAPR_GRPC_PORT
              value: "50001"
            - name: DAPR_HTTP_PORT
              value: "3500"
            - name: LOG_LEVEL
              value: {{ .Values.nemesis.logLevel | quote }}
            - name: NEMESIS_URL
              value: {{ .Values.nemesis.url | quote }}
            - name: WORKFLOW_RUNTIME_LOG_LEVEL
              value: {{ .Values.llm.agents.env.workflowRuntimeLogLevel | quote }}
            - name: WORKFLOW_CLIENT_LOG_LEVEL
              value: {{ .Values.llm.agents.env.workflowClientLogLevel | quote }}
            - name: LITELLM_ADMIN_KEY
              value: "sk-{{ .Values.llm.agents.env.litellmAdminPassword }}"
            - name: MAX_BUDGET
              value: {{ .Values.llm.agents.env.maxBudget | quote }}
            - name: BUDGET_DURATION
              value: {{ .Values.llm.agents.env.budgetDuration | quote }}
            - name: DOTNET_ANALYSIS_RUN_REQUEST_LIMIT
              value: {{ .Values.llm.agents.env.dotnetAnalysisRunRequestLimit | quote }}
            - name: DOTNET_ANALYSIS_RUN_TOKENS_LIMIT
              value: {{ .Values.llm.agents.env.dotnetAnalysisRunTokensLimit | quote }}
            - name: TRIAGE_CONSENSUS_THRESHOLD
              value: {{ .Values.llm.agents.env.triageConsensusThreshold | quote }}
            - name: MCP_MAX_RESULTS
              value: {{ .Values.llm.agents.env.mcpMaxResults | quote }}
            - name: CHATBOT_DB_PASSWORD
              value: {{ .Values.llm.agents.env.chatbotDbPassword | quote }}
            - name: PHOENIX_ENABLED
              value: "true"
            - name: PHOENIX_ENDPOINT
              value: "http://phoenix:6006/v1/traces"
            - name: PHOENIX_SQL_DATABASE_URL
              value: "postgresql://{{ .Values.postgres.user }}:{{ .Values.postgres.password }}@postgres:{{ .Values.postgres.port }}/phoenix"
            {{- if .Values.monitoring.enabled }}
            - name: NEMESIS_MONITORING
              value: "enabled"
            - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
              value: "http://otel-collector:4317"
            - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT_INSECURE
              value: "true"
            {{- else }}
            - name: NEMESIS_MONITORING
              value: "disabled"
            {{- end }}
            {{- include "nemesis.postgresEnv" . | nindent 12 }}
            {{- include "nemesis.s3Env" . | nindent 12 }}
            {{- include "nemesis.rabbitmqEnv" . | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 40
            periodSeconds: 15
          resources:
            {{- toYaml .Values.llm.agents.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: agents
  namespace: {{ include "nemesis.namespace" . }}
  labels:
    {{- include "nemesis.labels" . | nindent 4 }}
    {{- include "nemesis.selectorLabels" (dict "name" "agents" "context" .) | nindent 4 }}
spec:
  selector:
    {{- include "nemesis.selectorLabels" (dict "name" "agents" "context" .) | nindent 4 }}
  ports:
    - port: {{ .Values.llm.agents.appPort }}
      targetPort: http
      name: http
    - port: {{ .Values.llm.agents.mcpPort }}
      targetPort: mcp
      name: mcp
{{- end }}
