apiVersion: v1
kind: Secret
metadata:
  name: nemesis-secrets
  namespace: {{ include "nemesis.namespace" . }}
  labels:
    {{- include "nemesis.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.credentials.postgres.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.credentials.postgres.password | quote }}
  POSTGRES_HOST: "pgbouncer"
  POSTGRES_PORT: {{ .Values.postgres.port | quote }}
  POSTGRES_DB: {{ .Values.postgres.database | quote }}
  S3_ACCESS_KEY: {{ .Values.credentials.s3.accessKey | quote }}
  S3_SECRET_KEY: {{ .Values.credentials.s3.secretKey | quote }}
  RABBITMQ_USER: {{ .Values.credentials.rabbitmq.user | quote }}
  RABBITMQ_PASSWORD: {{ .Values.credentials.rabbitmq.password | quote }}
  RABBITMQ_CONNECTION_STRING: "amqp://{{ .Values.credentials.rabbitmq.user }}:{{ .Values.credentials.rabbitmq.password }}@rabbitmq.{{ include "nemesis.namespace" . }}.svc.cluster.local:5672"
  HASURA_ADMIN_SECRET: {{ .Values.credentials.hasura.adminSecret | quote }}
  BASIC_AUTH_USERS: {{ .Values.credentials.basicAuthUsers | quote }}
  CHATBOT_DB_PASSWORD: "chatbot_pass_change_me"
---
# Dapr secret store file — mounted as a volume into all Dapr-enabled pods.
# Matches compose's secretstores.local.env behavior using secretstores.local.file.
apiVersion: v1
kind: Secret
metadata:
  name: nemesis-dapr-secrets
  namespace: {{ include "nemesis.namespace" . }}
  labels:
    {{- include "nemesis.labels" . | nindent 4 }}
type: Opaque
stringData:
  secrets.json: |
    {
      "HASURA_ADMIN_SECRET": {{ .Values.credentials.hasura.adminSecret | quote }},
      "RABBITMQ_USER": {{ .Values.credentials.rabbitmq.user | quote }},
      "RABBITMQ_PASSWORD": {{ .Values.credentials.rabbitmq.password | quote }},
      "RABBITMQ_CONNECTION_STRING": "amqp://{{ .Values.credentials.rabbitmq.user }}:{{ .Values.credentials.rabbitmq.password }}@rabbitmq:5672",
      "POSTGRES_USER": {{ .Values.credentials.postgres.user | quote }},
      "POSTGRES_PASSWORD": {{ .Values.credentials.postgres.password | quote }},
      "POSTGRES_HOST": "pgbouncer",
      "POSTGRES_PORT": {{ .Values.postgres.port | quote }},
      "POSTGRES_DB": {{ .Values.postgres.database | quote }},
      "POSTGRES_PARAMETERS": {{ .Values.postgres.parameters | quote }},
      "S3_ACCESS_KEY": {{ .Values.credentials.s3.accessKey | quote }},
      "S3_SECRET_KEY": {{ .Values.credentials.s3.secretKey | quote }},
      "BASIC_AUTH_USERS": {{ .Values.credentials.basicAuthUsers | quote }},
      "CHATBOT_DB_PASSWORD": "chatbot_pass_change_me"
    }
