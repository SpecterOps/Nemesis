apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "nemesis.fullname" . }}-test-connection"
  namespace: {{ include "nemesis.namespace" . }}
  labels:
    {{- include "nemesis.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    dapr.io/enabled: "false"
spec:
  restartPolicy: Never
  containers:
    - name: test
      image: busybox:1.37
      command: ['sh', '-c']
      args:
        - |
          echo "=== Nemesis Connectivity Test ==="
          FAIL=0

          check() {
            local name="$1" host="$2" port="$3"
            if nc -z -w5 "$host" "$port" 2>/dev/null; then
              echo "PASS: $name ($host:$port)"
            else
              echo "FAIL: $name ($host:$port)"
              FAIL=$((FAIL + 1))
            fi
          }

          check "PostgreSQL"          postgres            5432
          check "RabbitMQ AMQP"       rabbitmq            5672
          check "RabbitMQ Management" rabbitmq            15672
          check "SeaweedFS S3"        seaweedfs           8333
          check "Hasura"              hasura              8080
          check "Web API"             web-api             {{ .Values.webApi.port }}
          check "File Enrichment"     file-enrichment     {{ .Values.fileEnrichment.port }}
          check "Document Conversion" document-conversion {{ .Values.documentConversion.port }}
          check "Gotenberg"           gotenberg           {{ .Values.gotenberg.port }}
          check "Frontend"            frontend            {{ .Values.frontend.port }}

          {{- if .Values.monitoring.enabled }}
          check "Prometheus"          prometheus           {{ .Values.monitoring.prometheus.port }}
          check "Grafana"             grafana              {{ .Values.monitoring.grafana.port }}
          check "Loki"                loki                 {{ .Values.monitoring.loki.port }}
          check "Jaeger"              jaeger               {{ .Values.monitoring.jaeger.port }}
          {{- end }}
          {{- if .Values.jupyter.enabled }}
          check "Jupyter"             jupyter              {{ .Values.jupyter.port }}
          {{- end }}
          {{- if .Values.llm.enabled }}
          check "LiteLLM"             litellm              {{ .Values.llm.litellm.port }}
          check "Phoenix"             phoenix              {{ .Values.llm.phoenix.port }}
          {{- end }}

          echo ""
          if [ "$FAIL" -gt 0 ]; then
            echo "RESULT: $FAIL service(s) unreachable"
            exit 1
          else
            echo "RESULT: All services reachable"
            exit 0
          fi
