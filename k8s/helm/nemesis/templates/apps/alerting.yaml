apiVersion: apps/v1
kind: Deployment
metadata:
  name: alerting
  namespace: {{ include "nemesis.namespace" . }}
  labels:
    {{- include "nemesis.labels" . | nindent 4 }}
    {{- include "nemesis.selectorLabels" (dict "name" "alerting" "context" .) | nindent 4 }}
spec:
  replicas: {{ .Values.alerting.replicas }}
  selector:
    matchLabels:
      {{- include "nemesis.selectorLabels" (dict "name" "alerting" "context" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nemesis.selectorLabels" (dict "name" "alerting" "context" .) | nindent 8 }}
      annotations:
        {{- include "nemesis.daprAnnotations" (dict "appId" .Values.alerting.dapr.appId "appPort" (toString .Values.alerting.port) "config" .Values.alerting.dapr.config) | nindent 8 }}
    spec:
      initContainers:
        {{- include "nemesis.waitForInfra" . | nindent 8 }}
      containers:
        - name: alerting
          image: {{ include "nemesis.image" (dict "image" .Values.alerting.image "context" .) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.alerting.port }}
              name: http
          env:
            - name: APP_ID
              value: {{ .Values.alerting.dapr.appId | quote }}
            - name: DAPR_GRPC_PORT
              value: "50001"
            - name: DAPR_HTTP_PORT
              value: "3500"
            - name: LOG_LEVEL
              value: {{ .Values.nemesis.logLevel | quote }}
            - name: NEMESIS_URL
              value: {{ .Values.nemesis.url | quote }}
            - name: APPRISE_URLS
              value: {{ .Values.alerting.env.appriseUrls | quote }}
            {{- include "nemesis.postgresEnv" . | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            {{- toYaml .Values.alerting.resources | nindent 12 }}
      volumes:
        {{- include "nemesis.daprSecretsVolume" . | nindent 8 }}
---
apiVersion: v1
kind: Service
metadata:
  name: alerting
  namespace: {{ include "nemesis.namespace" . }}
  labels:
    {{- include "nemesis.labels" . | nindent 4 }}
    {{- include "nemesis.selectorLabels" (dict "name" "alerting" "context" .) | nindent 4 }}
spec:
  selector:
    {{- include "nemesis.selectorLabels" (dict "name" "alerting" "context" .) | nindent 4 }}
  ports:
    - port: {{ .Values.alerting.port }}
      targetPort: http
      name: http
