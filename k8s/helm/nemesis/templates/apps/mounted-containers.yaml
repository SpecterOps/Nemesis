{{- if .Values.mountedContainers.enabled }}
{{- if .Values.mountedContainers.storage.efsFileSystemId }}
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: efs-sc
  labels:
    {{- include "nemesis.labels" . | nindent 4 }}
provisioner: efs.csi.aws.com
parameters:
  provisioningMode: efs-ap
  fileSystemId: {{ .Values.mountedContainers.storage.efsFileSystemId | quote }}
  directoryPerms: "755"
  uid: "0"
  gid: "0"
volumeBindingMode: Immediate
{{- end }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mounted-containers
  namespace: {{ include "nemesis.namespace" . }}
  labels:
    {{- include "nemesis.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: {{ .Values.mountedContainers.storage.storageClass | quote }}
  resources:
    requests:
      storage: {{ .Values.mountedContainers.storage.size }}
{{- end }}
