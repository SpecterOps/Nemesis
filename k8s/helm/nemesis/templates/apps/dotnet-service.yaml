apiVersion: apps/v1
kind: Deployment
metadata:
  name: dotnet-service
  namespace: {{ include "nemesis.namespace" . }}
  labels:
    {{- include "nemesis.labels" . | nindent 4 }}
    {{- include "nemesis.selectorLabels" (dict "name" "dotnet-service" "context" .) | nindent 4 }}
spec:
  {{- if not (and .Values.autoscaling.enabled .Values.autoscaling.dotnetService.enabled) }}
  replicas: {{ .Values.dotnetService.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "nemesis.selectorLabels" (dict "name" "dotnet-service" "context" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nemesis.selectorLabels" (dict "name" "dotnet-service" "context" .) | nindent 8 }}
      annotations:
        {{- include "nemesis.daprAnnotations" (dict "appId" .Values.dotnetService.dapr.appId "appPort" (toString .Values.dotnetService.port) "config" .Values.dotnetService.dapr.config "maxConcurrency" (toString .Values.dotnetService.dapr.maxConcurrency)) | nindent 8 }}
    spec:
      containers:
        - name: dotnet-service
          image: {{ include "nemesis.image" (dict "image" .Values.dotnetService.image "context" .) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.dotnetService.port }}
              name: http
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:{{ .Values.dotnetService.port }}"
            - name: DAPR_GRPC_PORT
              value: "50001"
            - name: DAPR_HTTP_PORT
              value: "3500"
            {{- include "nemesis.s3Env" . | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            {{- toYaml .Values.dotnetService.resources | nindent 12 }}
      volumes:
        {{- include "nemesis.daprSecretsVolume" . | nindent 8 }}
---
apiVersion: v1
kind: Service
metadata:
  name: dotnet-service
  namespace: {{ include "nemesis.namespace" . }}
  labels:
    {{- include "nemesis.labels" . | nindent 4 }}
    {{- include "nemesis.selectorLabels" (dict "name" "dotnet-service" "context" .) | nindent 4 }}
spec:
  selector:
    {{- include "nemesis.selectorLabels" (dict "name" "dotnet-service" "context" .) | nindent 4 }}
  ports:
    - port: {{ .Values.dotnetService.port }}
      targetPort: http
      name: http
