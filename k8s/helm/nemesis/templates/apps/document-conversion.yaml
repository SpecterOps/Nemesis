apiVersion: apps/v1
kind: Deployment
metadata:
  name: document-conversion
  namespace: {{ include "nemesis.namespace" . }}
  labels:
    {{- include "nemesis.labels" . | nindent 4 }}
    {{- include "nemesis.selectorLabels" (dict "name" "document-conversion" "context" .) | nindent 4 }}
spec:
  {{- if not (and .Values.autoscaling.enabled .Values.autoscaling.documentConversion.enabled) }}
  replicas: {{ .Values.documentConversion.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "nemesis.selectorLabels" (dict "name" "document-conversion" "context" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nemesis.selectorLabels" (dict "name" "document-conversion" "context" .) | nindent 8 }}
      annotations:
        {{- include "nemesis.daprAnnotations" (dict "appId" .Values.documentConversion.dapr.appId "appPort" (toString .Values.documentConversion.port) "config" .Values.documentConversion.dapr.config "maxRequestSizeMB" "1024") | nindent 8 }}
    spec:
      initContainers:
        {{- include "nemesis.waitForInfra" . | nindent 8 }}
      containers:
        - name: document-conversion
          image: {{ include "nemesis.image" (dict "image" .Values.documentConversion.image "context" .) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.documentConversion.port }}
              name: http
          env:
            - name: APP_ID
              value: {{ .Values.documentConversion.dapr.appId | quote }}
            - name: DAPR_GRPC_PORT
              value: "50001"
            - name: DAPR_HTTP_PORT
              value: "3500"
            - name: LOG_LEVEL
              value: {{ .Values.nemesis.logLevel | quote }}
            - name: NEMESIS_URL
              value: {{ .Values.nemesis.url | quote }}
            - name: TIKA_CONFIG
              value: {{ .Values.documentConversion.env.tikaConfig | quote }}
            - name: TIKA_OCR_LANGUAGES
              value: {{ .Values.documentConversion.env.tikaOcrLanguages | quote }}
            - name: TIKA_USE_OCR
              value: {{ .Values.documentConversion.env.tikaUseOcr | quote }}
            - name: MAX_PARALLEL_WORKFLOWS
              value: {{ .Values.documentConversion.env.maxParallelWorkflows | quote }}
            - name: MAX_WORKFLOW_EXECUTION_TIME
              value: {{ .Values.documentConversion.env.maxWorkflowExecutionTime | quote }}
            - name: OMP_THREAD_LIMIT
              value: {{ .Values.documentConversion.env.ompThreadLimit | quote }}
            {{- include "nemesis.postgresEnv" . | nindent 12 }}
            {{- include "nemesis.s3Env" . | nindent 12 }}
            {{- include "nemesis.rabbitmqEnv" . | nindent 12 }}
            - name: HASURA_ADMIN_SECRET
              valueFrom:
                secretKeyRef:
                  name: nemesis-secrets
                  key: HASURA_ADMIN_SECRET
          volumeMounts:
            - name: tika-config
              mountPath: /tika-config.xml
              subPath: tika-config.xml
            - name: tika-config
              mountPath: /tika-config-tesseract.xml
              subPath: tika-config-tesseract.xml
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            {{- toYaml .Values.documentConversion.resources | nindent 12 }}
      volumes:
        - name: tika-config
          configMap:
            name: tika-config
        {{- include "nemesis.daprSecretsVolume" . | nindent 8 }}
---
apiVersion: v1
kind: Service
metadata:
  name: document-conversion
  namespace: {{ include "nemesis.namespace" . }}
  labels:
    {{- include "nemesis.labels" . | nindent 4 }}
    {{- include "nemesis.selectorLabels" (dict "name" "document-conversion" "context" .) | nindent 4 }}
spec:
  selector:
    {{- include "nemesis.selectorLabels" (dict "name" "document-conversion" "context" .) | nindent 4 }}
  ports:
    - port: {{ .Values.documentConversion.port }}
      targetPort: http
      name: http
