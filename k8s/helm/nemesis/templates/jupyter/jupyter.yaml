{{- if .Values.jupyter.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jupyter
  namespace: {{ include "nemesis.namespace" . }}
  labels:
    {{- include "nemesis.labels" . | nindent 4 }}
    {{- include "nemesis.selectorLabels" (dict "name" "jupyter" "context" .) | nindent 4 }}
spec:
  replicas: {{ .Values.jupyter.replicas }}
  selector:
    matchLabels:
      {{- include "nemesis.selectorLabels" (dict "name" "jupyter" "context" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nemesis.selectorLabels" (dict "name" "jupyter" "context" .) | nindent 8 }}
      annotations:
        dapr.io/enabled: "false"
    spec:
      containers:
        - name: jupyter
          image: {{ include "nemesis.image" (dict "image" .Values.jupyter.image "context" .) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.jupyter.port }}
              name: http
          env:
            - name: HASURA_ADMIN_SECRET
              valueFrom:
                secretKeyRef:
                  name: nemesis-secrets
                  key: HASURA_ADMIN_SECRET
            - name: HASURA_GRAPHQL_URL
              value: "http://hasura:8080/v1/graphql"
            - name: JUPYTER_PASSWORD
              value: {{ .Values.jupyter.env.jupyterPassword | quote }}
          readinessProbe:
            httpGet:
              path: /jupyter/api
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /jupyter/api
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            {{- toYaml .Values.jupyter.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: jupyter
  namespace: {{ include "nemesis.namespace" . }}
  labels:
    {{- include "nemesis.labels" . | nindent 4 }}
    {{- include "nemesis.selectorLabels" (dict "name" "jupyter" "context" .) | nindent 4 }}
spec:
  selector:
    {{- include "nemesis.selectorLabels" (dict "name" "jupyter" "context" .) | nindent 4 }}
  ports:
    - port: {{ .Values.jupyter.port }}
      targetPort: http
      name: http
{{- end }}
