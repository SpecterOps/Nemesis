# EKS overrides — use with: ./k8s/scripts/deploy.sh install --values k8s/helm/nemesis/values-eks.yaml
# This file is regenerated by setup-cluster-eks.sh with your NLB hostname and credentials.
# All infrastructure (PostgreSQL, RabbitMQ, SeaweedFS) runs in-cluster by default.

nemesis:
  # Replace with your NLB hostname after running setup-cluster-eks.sh
  # e.g. "https://abc123.elb.us-east-1.amazonaws.com/"
  url: "https://REPLACE_WITH_NLB_HOSTNAME/"
  port: 443

# EBS gp3 storage (created by setup-cluster-eks.sh).
# Sizes below are 10x the base defaults for cloud use. Adjust before deploying
# if you want smaller (cheaper) or larger volumes. EBS gp3 costs ~$0.08/GB/month.
# Volumes can be expanded later without downtime (gp3 has allowVolumeExpansion: true).
postgres:
  storage:
    size: 200Gi
    storageClass: gp3

rabbitmq:
  storage:
    size: 100Gi
    storageClass: gp3

seaweedfs:
  storage:
    size: 500Gi
    storageClass: gp3

monitoring:
  prometheus:
    storage:
      size: 100Gi
      storageClass: gp3
  grafana:
    storage:
      size: 50Gi
      storageClass: gp3
  loki:
    storage:
      size: 100Gi
      storageClass: gp3
  jaeger:
    storage:
      size: 100Gi
      storageClass: gp3

llm:
  phoenix:
    storage:
      size: 50Gi
      storageClass: gp3
#   # Replace with your AWS credentials for Bedrock LLM use
#   # For STS temp credentials awsSessionToken needed
