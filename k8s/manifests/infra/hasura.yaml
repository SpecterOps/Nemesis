# Hasura metadata configmap is generated by deploy.sh which inlines files.
# Placeholder — deploy.sh creates this from the Helm chart's files/ directory.
apiVersion: v1
kind: ConfigMap
metadata:
  name: hasura-metadata
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/part-of: nemesis
data:
  databases.yaml: |
    __PLACEHOLDER_DATABASES_YAML__
  functions.yaml: |
    __PLACEHOLDER_FUNCTIONS_YAML__
  tables.yaml: |
    __PLACEHOLDER_TABLES_YAML__
  version.yaml: |
    __PLACEHOLDER_VERSION_YAML__
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hasura
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/part-of: nemesis
    app.kubernetes.io/name: hasura
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hasura
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hasura
      annotations:
        dapr.io/enabled: "false"
    spec:
      containers:
        - name: hasura
          image: "${HASURA_IMAGE}"
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: nemesis-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nemesis-secrets
                  key: POSTGRES_PASSWORD
            - name: HASURA_GRAPHQL_DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@pgbouncer:${POSTGRES_PORT}/${POSTGRES_DB}"
            - name: HASURA_GRAPHQL_METADATA_DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@pgbouncer:${POSTGRES_PORT}/${POSTGRES_DB}"
            - name: HASURA_GRAPHQL_ENABLE_CONSOLE
              value: "${HASURA_ENABLE_CONSOLE}"
            - name: HASURA_GRAPHQL_ADMIN_SECRET
              valueFrom:
                secretKeyRef:
                  name: nemesis-secrets
                  key: HASURA_ADMIN_SECRET
            - name: HASURA_GRAPHQL_BASE_PATH
              value: "/hasura"
            - name: HASURA_GRAPHQL_METADATA_DIR
              value: /hasura-metadata
            - name: HASURA_GRAPHQL_LOG_LEVEL
              value: "${HASURA_LOG_LEVEL}"
            - name: HASURA_GRAPHQL_UNAUTHORIZED_ROLE
              value: "anonymous"
            - name: HASURA_GRAPHQL_ENABLE_METADATA_SYNC
              value: "true"
            - name: HASURA_GRAPHQL_ENABLE_TELEMETRY
              value: "false"
            - name: HASURA_GRAPHQL_ENABLED_LOG_TYPES
              value: "startup, http-log, webhook-log, websocket-log, query-log"
          volumeMounts:
            - name: metadata
              mountPath: /hasura-metadata
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: ${HASURA_CPU_REQUEST}
              memory: ${HASURA_MEMORY_REQUEST}
            limits:
              cpu: "${HASURA_CPU_LIMIT}"
              memory: ${HASURA_MEMORY_LIMIT}
      volumes:
        - name: metadata
          configMap:
            name: hasura-metadata
---
apiVersion: v1
kind: Service
metadata:
  name: hasura
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/part-of: nemesis
    app.kubernetes.io/name: hasura
spec:
  selector:
    app.kubernetes.io/name: hasura
  ports:
    - port: 8080
      targetPort: http
      name: http
