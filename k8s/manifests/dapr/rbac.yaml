apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dapr-secret-reader
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/part-of: nemesis
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dapr-secret-reader
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/part-of: nemesis
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dapr-secret-reader
subjects:
  - kind: ServiceAccount
    name: default
    namespace: ${NAMESPACE}
