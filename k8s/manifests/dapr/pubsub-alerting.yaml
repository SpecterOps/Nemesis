apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: alerting
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/part-of: nemesis
spec:
  type: pubsub.rabbitmq
  version: v1
  metadata:
    - name: connectionString
      secretKeyRef:
        name: RABBITMQ_CONNECTION_STRING
        key: RABBITMQ_CONNECTION_STRING
    - name: consumerID
      value: alerting
    - name: durable
      value: "true"
    - name: deletedWhenUnused
      value: "false"
    - name: autoAck
      value: "false"
    - name: deliveryMode
      value: "2"
    - name: publisherConfirm
      value: "true"
    - name: requeueInFailure
      value: "true"
    - name: enableDeadLetter
      value: "true"
    - name: maxPriority
      value: "3"
    - name: prefetchCount
      value: "${DAPR_PUBSUB_ALERTING_PREFETCH}"
auth:
  secretStore: nemesis-secret-store
scopes:
  - alerting
  - file-enrichment
