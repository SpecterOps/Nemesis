apiVersion: apps/v1
kind: Deployment
metadata:
  name: housekeeping
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/part-of: nemesis
    app.kubernetes.io/name: housekeeping
spec:
  replicas: ${HOUSEKEEPING_REPLICAS}
  selector:
    matchLabels:
      app.kubernetes.io/name: housekeeping
  template:
    metadata:
      labels:
        app.kubernetes.io/name: housekeeping
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "housekeeping"
        dapr.io/app-port: "8000"
        dapr.io/config: "dapr-config"
        dapr.io/http-max-request-size: "300"
        dapr.io/enable-metrics: "true"
        dapr.io/metrics-port: "9090"
        dapr.io/graceful-shutdown-seconds: "5"
        dapr.io/log-level: "info"
        dapr.io/volume-mounts: "dapr-secrets:/dapr/secrets"
        dapr.io/sidecar-cpu-request: "50m"
        dapr.io/sidecar-memory-request: "64Mi"
        dapr.io/sidecar-cpu-limit: "300m"
        dapr.io/sidecar-memory-limit: "256Mi"
    spec:
      initContainers:
        - name: wait-for-pgbouncer
          image: busybox:1.37
          command: ['sh', '-c', 'until nc -z pgbouncer 5432; do echo "Waiting for PgBouncer..."; sleep 2; done']
        - name: wait-for-rabbitmq
          image: busybox:1.37
          command: ['sh', '-c', 'until nc -z rabbitmq 5672; do echo "Waiting for RabbitMQ..."; sleep 2; done']
      containers:
        - name: housekeeping
          image: "${IMAGE_REGISTRY}/housekeeping:${HOUSEKEEPING_IMAGE_TAG}"
          imagePullPolicy: ${IMAGE_PULL_POLICY}
          env:
            - name: APP_ID
              value: "housekeeping"
            - name: DAPR_GRPC_PORT
              value: "50001"
            - name: DAPR_HTTP_PORT
              value: "3500"
            - name: LOG_LEVEL
              value: "${LOG_LEVEL}"
            - name: CLEANUP_SCHEDULE
              value: "${CLEANUP_SCHEDULE}"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: nemesis-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nemesis-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_HOST
              value: "pgbouncer"
            - name: POSTGRES_PORT
              value: "${POSTGRES_PORT}"
            - name: POSTGRES_DB
              value: "${POSTGRES_DB}"
            - name: POSTGRES_PARAMETERS
              value: "${POSTGRES_PARAMETERS}"
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: nemesis-secrets
                  key: S3_ACCESS_KEY
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: nemesis-secrets
                  key: S3_SECRET_KEY
            - name: S3_ENDPOINT
              value: "seaweedfs:8333"
            - name: S3_BUCKET
              value: "files"
          resources:
            requests:
              cpu: ${HOUSEKEEPING_CPU_REQUEST}
              memory: ${HOUSEKEEPING_MEMORY_REQUEST}
            limits:
              cpu: ${HOUSEKEEPING_CPU_LIMIT}
              memory: ${HOUSEKEEPING_MEMORY_LIMIT}
      volumes:
        - name: dapr-secrets
          secret:
            secretName: nemesis-dapr-secrets
