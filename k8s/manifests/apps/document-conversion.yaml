apiVersion: apps/v1
kind: Deployment
metadata:
  name: document-conversion
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/part-of: nemesis
    app.kubernetes.io/name: document-conversion
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: document-conversion
  template:
    metadata:
      labels:
        app.kubernetes.io/name: document-conversion
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "document-conversion"
        dapr.io/app-port: "${DOCUMENT_CONVERSION_PORT}"
        dapr.io/config: "document-conversion-config"
        dapr.io/http-max-request-size: "1024"
        dapr.io/enable-metrics: "true"
        dapr.io/metrics-port: "9090"
        dapr.io/graceful-shutdown-seconds: "5"
        dapr.io/log-level: "info"
        dapr.io/volume-mounts: "dapr-secrets:/dapr/secrets"
        dapr.io/sidecar-cpu-request: "50m"
        dapr.io/sidecar-memory-request: "64Mi"
        dapr.io/sidecar-cpu-limit: "300m"
        dapr.io/sidecar-memory-limit: "256Mi"
    spec:
      initContainers:
        - name: wait-for-pgbouncer
          image: busybox:1.37
          command: ['sh', '-c', 'until nc -z pgbouncer 5432; do echo "Waiting for PgBouncer..."; sleep 2; done']
        - name: wait-for-rabbitmq
          image: busybox:1.37
          command: ['sh', '-c', 'until nc -z rabbitmq 5672; do echo "Waiting for RabbitMQ..."; sleep 2; done']
      containers:
        - name: document-conversion
          image: "${IMAGE_REGISTRY}/document-conversion:${DOCUMENT_CONVERSION_IMAGE_TAG}"
          imagePullPolicy: ${IMAGE_PULL_POLICY}
          ports:
            - containerPort: ${DOCUMENT_CONVERSION_PORT}
              name: http
          env:
            - name: APP_ID
              value: "document-conversion"
            - name: DAPR_GRPC_PORT
              value: "50001"
            - name: DAPR_HTTP_PORT
              value: "3500"
            - name: LOG_LEVEL
              value: "${LOG_LEVEL}"
            - name: NEMESIS_URL
              value: "${NEMESIS_URL}"
            - name: TIKA_CONFIG
              value: "${TIKA_CONFIG}"
            - name: TIKA_OCR_LANGUAGES
              value: "${TIKA_OCR_LANGUAGES}"
            - name: TIKA_USE_OCR
              value: "${TIKA_USE_OCR}"
            - name: MAX_PARALLEL_WORKFLOWS
              value: "${DOCUMENT_CONVERSION_MAX_PARALLEL_WORKFLOWS}"
            - name: MAX_WORKFLOW_EXECUTION_TIME
              value: "${DOCUMENT_CONVERSION_MAX_WORKFLOW_EXECUTION_TIME}"
            - name: OMP_THREAD_LIMIT
              value: "${OMP_THREAD_LIMIT}"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: nemesis-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nemesis-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_HOST
              value: "pgbouncer"
            - name: POSTGRES_PORT
              value: "${POSTGRES_PORT}"
            - name: POSTGRES_DB
              value: "${POSTGRES_DB}"
            - name: POSTGRES_PARAMETERS
              value: "${POSTGRES_PARAMETERS}"
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: nemesis-secrets
                  key: S3_ACCESS_KEY
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: nemesis-secrets
                  key: S3_SECRET_KEY
            - name: S3_ENDPOINT
              value: "seaweedfs:8333"
            - name: S3_BUCKET
              value: "files"
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: nemesis-secrets
                  key: RABBITMQ_USER
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nemesis-secrets
                  key: RABBITMQ_PASSWORD
            - name: RABBITMQ_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: nemesis-secrets
                  key: RABBITMQ_CONNECTION_STRING
            - name: HASURA_ADMIN_SECRET
              valueFrom:
                secretKeyRef:
                  name: nemesis-secrets
                  key: HASURA_ADMIN_SECRET
          volumeMounts:
            - name: tika-config
              mountPath: /tika-config.xml
              subPath: tika-config.xml
            - name: tika-config
              mountPath: /tika-config-tesseract.xml
              subPath: tika-config-tesseract.xml
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: ${DOCUMENT_CONVERSION_CPU_REQUEST}
              memory: ${DOCUMENT_CONVERSION_MEMORY_REQUEST}
            limits:
              cpu: "${DOCUMENT_CONVERSION_CPU_LIMIT}"
              memory: ${DOCUMENT_CONVERSION_MEMORY_LIMIT}
      volumes:
        - name: tika-config
          configMap:
            name: tika-config
        - name: dapr-secrets
          secret:
            secretName: nemesis-dapr-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: document-conversion
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/part-of: nemesis
    app.kubernetes.io/name: document-conversion
spec:
  selector:
    app.kubernetes.io/name: document-conversion
  ports:
    - port: ${DOCUMENT_CONVERSION_PORT}
      targetPort: http
      name: http
