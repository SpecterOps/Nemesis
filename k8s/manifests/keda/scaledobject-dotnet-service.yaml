apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: dotnet-service-scaler
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/part-of: nemesis
spec:
  scaleTargetRef:
    name: dotnet-service
  minReplicaCount: ${KEDA_DOTNET_SERVICE_MIN_REPLICAS}
  maxReplicaCount: ${KEDA_DOTNET_SERVICE_MAX_REPLICAS}
  cooldownPeriod: ${KEDA_DOTNET_SERVICE_COOLDOWN}
  pollingInterval: ${KEDA_DOTNET_SERVICE_POLLING}
  triggers:
    - type: rabbitmq
      metadata:
        protocol: amqp
        queueName: "${KEDA_DOTNET_SERVICE_QUEUE_NAME}"
        mode: QueueLength
        value: "${KEDA_DOTNET_SERVICE_QUEUE_LENGTH}"
      authenticationRef:
        name: rabbitmq-trigger-auth
