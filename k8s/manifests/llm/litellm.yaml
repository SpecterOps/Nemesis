apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/part-of: nemesis
data:
  config.yml: |
    model_list:
      - model_name: default
        litellm_params:
          model: bedrock/us.anthropic.claude-sonnet-4-5-20250929-v1:0
          aws_access_key_id: os.environ/AWS_ACCESS_KEY_ID
          aws_secret_access_key: os.environ/AWS_SECRET_ACCESS_KEY
          aws_region_name: "us-east-1"

    general_settings:
      database_connection_pool_limit: 30
      database_connection_timeout: 60
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/part-of: nemesis
    app.kubernetes.io/name: litellm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: litellm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litellm
      annotations:
        dapr.io/enabled: "false"
    spec:
      containers:
        - name: litellm
          image: "${LITELLM_IMAGE}"
          imagePullPolicy: ${IMAGE_PULL_POLICY}
          args:
            - "--config"
            - "/app/config.yml"
          ports:
            - containerPort: 4000
              name: http
          env:
            - name: DATABASE_URL
              value: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT}/litellm"
            - name: STORE_MODEL_IN_DB
              value: "${LITELLM_STORE_MODEL_IN_DB}"
            - name: AWS_ACCESS_KEY_ID
              value: "${LITELLM_AWS_ACCESS_KEY_ID}"
            - name: AWS_SECRET_ACCESS_KEY
              value: "${LITELLM_AWS_SECRET_ACCESS_KEY}"
            - name: AWS_REGION_NAME
              value: "${LITELLM_AWS_REGION_NAME}"
            - name: LITELLM_MASTER_KEY
              value: "sk-${LITELLM_ADMIN_PASSWORD}"
            - name: LITELLM_SALT_KEY
              value: "sk-${LITELLM_ADMIN_PASSWORD}"
            - name: SERVER_ROOT_PATH
              value: "/llm"
            - name: PROXY_BASE_URL
              value: "${NEMESIS_URL}"
            - name: UI_BASE_PATH
              value: "/llm/ui"
          volumeMounts:
            - name: config
              mountPath: /app/config.yml
              subPath: config.yml
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              cpu: ${LITELLM_CPU_REQUEST}
              memory: ${LITELLM_MEMORY_REQUEST}
            limits:
              cpu: "${LITELLM_CPU_LIMIT}"
              memory: ${LITELLM_MEMORY_LIMIT}
      volumes:
        - name: config
          configMap:
            name: litellm-config
---
apiVersion: v1
kind: Service
metadata:
  name: litellm
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/part-of: nemesis
    app.kubernetes.io/name: litellm
spec:
  selector:
    app.kubernetes.io/name: litellm
  ports:
    - port: ${LITELLM_PORT}
      targetPort: http
      name: http
