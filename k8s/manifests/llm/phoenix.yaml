apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: phoenix-data
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/part-of: nemesis
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: ${PHOENIX_STORAGE_SIZE}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: phoenix
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/part-of: nemesis
    app.kubernetes.io/name: phoenix
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: phoenix
  template:
    metadata:
      labels:
        app.kubernetes.io/name: phoenix
      annotations:
        dapr.io/enabled: "false"
    spec:
      containers:
        - name: phoenix
          image: "${PHOENIX_IMAGE}"
          imagePullPolicy: ${IMAGE_PULL_POLICY}
          ports:
            - containerPort: 6006
              name: http
          env:
            - name: PHOENIX_WORKING_DIR
              value: "/data"
            - name: PHOENIX_HOST_ROOT_PATH
              value: "/phoenix"
            - name: PHOENIX_SQL_DATABASE_URL
              value: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT}/phoenix"
            - name: PHOENIX_DEFAULT_RETENTION_POLICY_DAYS
              value: "${PHOENIX_RETENTION_POLICY_DAYS}"
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: ${PHOENIX_CPU_REQUEST}
              memory: ${PHOENIX_MEMORY_REQUEST}
            limits:
              cpu: "${PHOENIX_CPU_LIMIT}"
              memory: ${PHOENIX_MEMORY_LIMIT}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: phoenix-data
---
apiVersion: v1
kind: Service
metadata:
  name: phoenix
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/part-of: nemesis
    app.kubernetes.io/name: phoenix
spec:
  selector:
    app.kubernetes.io/name: phoenix
  ports:
    - port: ${PHOENIX_PORT}
      targetPort: http
      name: http
