# Grafana dashboard ConfigMaps are generated by deploy.sh which base64-encodes
# the JSON dashboard files from the Helm chart's files/grafana-dashboards/ directory.
# Placeholder — deploy.sh creates these at deploy time.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-traefik
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/part-of: nemesis
binaryData:
  traefik.json: "__PLACEHOLDER_TRAEFIK_DASHBOARD__"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-seaweedfs
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/part-of: nemesis
binaryData:
  seaweedfs.json: "__PLACEHOLDER_SEAWEEDFS_DASHBOARD__"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-node-exporter
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/part-of: nemesis
binaryData:
  node_exporter_full.json: "__PLACEHOLDER_NODE_EXPORTER_DASHBOARD__"
