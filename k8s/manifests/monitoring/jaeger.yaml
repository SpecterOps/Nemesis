apiVersion: v1
kind: ConfigMap
metadata:
  name: jaeger-config
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/part-of: nemesis
data:
  config.yaml: |
    extensions:
      jaeger_storage:
        backends:
          badger_store:
            badger:
              directories:
                keys: /badger/keys
                values: /badger/values
              ephemeral: false
      jaeger_query:
        storage:
          traces: badger_store
        base-path: /jaeger
      healthcheckv2:
        http:
          endpoint: "0.0.0.0:13133"
          path: /status

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"

    processors:
      memory_limiter:
        limit_percentage: 75
        spike_limit_percentage: 20
        check_interval: 1s
      batch:
        timeout: 5s
        send_batch_size: 2048
        send_batch_max_size: 4096

    exporters:
      jaeger_storage_exporter:
        trace_storage: badger_store

    service:
      extensions: [jaeger_storage, jaeger_query, healthcheckv2]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [jaeger_storage_exporter]
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jaeger-data
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/part-of: nemesis
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: ${JAEGER_STORAGE_SIZE}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/part-of: nemesis
    app.kubernetes.io/name: jaeger
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: jaeger
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jaeger
      annotations:
        dapr.io/enabled: "false"
    spec:
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      containers:
        - name: jaeger
          image: "${JAEGER_IMAGE}"
          imagePullPolicy: ${IMAGE_PULL_POLICY}
          args:
            - "--config"
            - "/etc/jaeger/config.yaml"
          env:
            - name: QUERY_BASE_PATH
              value: "/jaeger"
            - name: GOGC
              value: "80"
          ports:
            - containerPort: 16686
              name: query
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 13133
              name: health
          volumeMounts:
            - name: config
              mountPath: /etc/jaeger
            - name: data
              mountPath: /badger
          readinessProbe:
            httpGet:
              path: /status
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /status
              port: health
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: ${JAEGER_CPU_REQUEST}
              memory: ${JAEGER_MEMORY_REQUEST}
            limits:
              cpu: "${JAEGER_CPU_LIMIT}"
              memory: ${JAEGER_MEMORY_LIMIT}
      volumes:
        - name: config
          configMap:
            name: jaeger-config
        - name: data
          persistentVolumeClaim:
            claimName: jaeger-data
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/part-of: nemesis
    app.kubernetes.io/name: jaeger
spec:
  selector:
    app.kubernetes.io/name: jaeger
  ports:
    - port: ${JAEGER_PORT}
      targetPort: query
      name: query
    - port: 4317
      targetPort: otlp-grpc
      name: otlp-grpc
